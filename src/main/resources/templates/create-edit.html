<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <th:block th:replace="~{fragments :: bootstrapCss()}"></th:block>
    <title>Pizzas</title>
</head>

<body>
    <th:block th:replace="~{fragments :: navbar}"></th:block>
    <div class="container text-center">
        <div class="row  d-flex justify-content-around h-100">
            <div class="col-12">
                <h1 th:text="|Pizzeria Napoli|" />
                <h2>
                    <th:block th:if="${edit}" th:text="|Modifica la pizza ${pizza.name}|"></th:block>
                    <th:block th:unless="${edit}" th:text="|Aggiungi una nuova pizza|">
                </h2>
            </div>
            <div class="col-6 text-start">
                <form id="pizza-form" th:action="${edit} ?@{/pizza/edit/{id}(id=${pizza.id})}  :@{/pizza/create}"
                    th:object="${pizza}" method="post">
                    <div class="mb-3">
                        <label for="name" class="form-label">Name</label>
                        <input type="text" name="name" id="name" class="form-control" th:field="*{name}">
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea name="description" id="description" class="form-control"
                            th:field="*{description}"></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="imageUrl" class="form-label">Url of the image</label>
                        <input type="text" name="imageUrl" id="imageUrl" class="form-control" th:field="*{imageUrl}">
                    </div>
                    <div class="mb-3">
                        <label for="price" class="form-label">Price</label>
                        <input type="number" name="price" id="price" class="form-control" th:field="*{price}">
                    </div>

                    <!-- -------------Checkbox ingredienti----------^.^---------- -->
                    <div class="mb-3">
                        <div class="form-check" th:each=" ingredient : ${ingredients}">
                            <label class="form-check-label" for="|ingredient-${ingredient.id}|"
                                th:text="${ingredient.name}" />
                            <input class="form-check-input" type="checkbox" th:id="|ingredient-${ingredient.id}|"
                                th:value="|${ingredient.id}|" th:field="${pizza.ingredients}">

                        </div>
                    </div>

                    <div class="mb-3 d-flex justify-content-between">
                        <input type="submit" value="submit" class="btn btn-outline-primary">
                        <a th:href="${edit} ?@{|/pizza/edit/${pizza.getId()}|} :@{/pizza/create}"
                            class="btn btn-outline-primary">Reset</a>
                    </div>
                </form>
            </div>
            <!-- ---------------------^.^ --- Anteprima di visualizzazione card -----work-in-progress------------ -->
            <div class="mt-3 col-6 text-start">
                <div class="card" style="width: 18rem;">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1c/Deus_Pizza.png/960px-Deus_Pizza.png?_=20200330135645"
                        class="card-img-top" alt="...">
                    <div class="card-body">
                        <h5 class="card-title">Pizza </h5>
                        <p class="card-text">Description: Some quick example text to build on the card display and make
                            up the bulk of
                            the pizza's card’s content.</p>
                        <p>0.00 €</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <th:block th:replace="~{fragments :: bootstrapJs()}"></th:block>
</body>

</html>
