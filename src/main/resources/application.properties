spring.application.name=spring-la-mia-pizzeria-webapi

#data source
spring.datasource.url = jdbc:mysql://localhost:3306/db_pizza_shop
spring.datasource.username = root
spring.datasource.password = duckU!

## Hibernate Properties
# Makes Hibernate generate better SQL query for the choosen db
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQLDialect

# Hibernate ddl auto (create, create-drop, validate, update, none)
# if we don't want any modification we have to use : 
# spring.jpa.generate-ddl= false
spring.jpa.hibernate.ddl-auto= update

##!impostazioni aggiuntive per il testing, da rimuovere in seguito
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql= true